name: Build & Test

on:
  push:
    branches: [main, tip, beta]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Build .app bundle
        run: ./scripts/build-app.sh --release

      - name: Memory leak guard
        run: ./scripts/leak-guard.sh

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ICloudGuard-app
          path: .build/ICloudGuard.app
